<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Santosh Store</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#101113;--panel:#16181b;--panel-2:#1d2024;--hairline:#2a2d31;--bone:#ece8e0;--bone-dim:#a8a49b;--champagne:#cba768;--champagne-dim:#8a7650;--green:#7ac99a;--red:#d47070;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--bone);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;}
  h1,h2,h3{font-family:'Sora',sans-serif;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-box{width:380px;background:var(--panel);border:1px solid var(--hairline);padding:48px 40px;}
  .login-box h2{margin-bottom:8px;font-size:22px;} .login-box p{color:var(--bone-dim);font-size:13px;margin-bottom:32px;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--champagne-dim);margin-bottom:9px;}
  .field input,.field select,.field textarea{width:100%;background:#0d0e10;border:1px solid var(--hairline);color:var(--bone);font-family:'Inter';font-size:14px;font-weight:300;padding:12px 15px;outline:none;transition:border-color .3s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--champagne-dim);}
  .field textarea{resize:vertical;min-height:72px;}
  .btn{padding:13px 24px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;cursor:pointer;border:none;transition:.3s;}
  .btn-gold{background:var(--champagne);color:var(--ink);}
  .btn-gold:hover{background:var(--bone);}
  .btn-ghost{background:transparent;border:1px solid var(--hairline);color:var(--bone-dim);}
  .btn-ghost:hover{border-color:var(--champagne-dim);color:var(--bone);}
  .btn-danger{background:transparent;border:1px solid #4a2a2a;color:var(--red);font-size:10px;padding:8px 14px;}
  .btn-danger:hover{background:#2a1a1a;}
  .err{background:#1e0e0e;border:1px solid #5a2a2a;color:var(--red);padding:12px 16px;font-size:13px;margin-top:16px;display:none;}

  /* APP */
  #app{display:none;}
  header.admin-header{background:var(--panel);border-bottom:1px solid var(--hairline);padding:0;}
  header.admin-header .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-family:'Sora';font-weight:700;font-size:15px;letter-spacing:2px;} .logo span{color:var(--champagne);}
  .admin-badge{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:#1a2318;border:1px solid #2a5a38;color:var(--green);padding:5px 12px;}
  nav.tabs{display:flex;gap:0;border-bottom:1px solid var(--hairline);background:var(--panel-2);}
  .tab{padding:16px 28px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--bone-dim);cursor:pointer;border-bottom:2px solid transparent;transition:.25s;}
  .tab:hover{color:var(--bone);}
  .tab.active{color:var(--champagne);border-bottom-color:var(--champagne);}
  .pane{display:none;padding:48px 0;}
  .pane.active{display:block;}
  .pane-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:16px;}
  .pane-header h2{font-size:22px;font-weight:600;}

  /* PRODUCT FORM */
  .add-form{background:var(--panel);border:1px solid var(--hairline);padding:36px;margin-bottom:40px;}
  .add-form h3{font-size:16px;font-weight:600;margin-bottom:26px;color:var(--champagne);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:620px){.form-row{grid-template-columns:1fr;}}
  .form-actions{display:flex;gap:14px;margin-top:24px;}

  /* PRODUCT TABLE */
  .prod-table{width:100%;border-collapse:collapse;}
  .prod-table th{text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--champagne-dim);padding:12px 16px;border-bottom:1px solid var(--hairline);}
  .prod-table td{padding:16px;border-bottom:1px solid var(--hairline);font-size:13px;vertical-align:middle;}
  .prod-table tr:hover td{background:var(--panel-2);}
  .badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:2px;}
  .badge-in{background:#0e1e14;border:1px solid #2a5a38;color:var(--green);}
  .badge-out{background:#1e0e0e;border:1px solid #4a2a2a;color:var(--red);}

  /* INQUIRIES */
  .inq-card{background:var(--panel);border:1px solid var(--hairline);padding:26px 28px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;}
  .inq-card.resolved{opacity:.45;}
  .inq-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .inq-tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--hairline);padding:4px 10px;color:var(--bone-dim);}
  .inq-date{font-size:11px;color:var(--bone-dim);}
  .status-new{color:var(--champagne);}
  .status-resolved{color:var(--bone-dim);}

  /* STATES */
  .loading-dots{display:flex;gap:10px;justify-content:center;padding:60px 0;}
  .loading-dots span{width:9px;height:9px;border-radius:50%;background:var(--champagne-dim);animation:blink 1.2s ease-in-out infinite;}
  .loading-dots span:nth-child(2){animation-delay:.2s;}
  .loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
  .empty{text-align:center;padding:60px;color:var(--bone-dim);font-size:14px;}
  .msg-bar{padding:13px 18px;font-size:13px;margin-bottom:22px;display:none;}
  .msg-bar.success{background:#0e1e14;border:1px solid #2a5a38;color:var(--green);display:block;}
  .msg-bar.error{background:#1e0e0e;border:1px solid #5a2a2a;color:var(--red);display:block;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Santosh Store management panel</p>
    <div class="field"><label>Admin Password</label><input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn btn-gold" style="width:100%" onclick="login()">Login</button>
    <div class="err" id="loginErr">Incorrect password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="admin-header">
    <div class="wrap">
      <div class="logo">SANTOSH <span>STORE</span></div>
      <div style="display:flex;align-items:center;gap:18px;">
        <span class="admin-badge">Admin Panel</span>
        <button class="btn btn-ghost" style="padding:8px 16px;font-size:10px" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tab active" data-tab="products" onclick="switchTab('products')">Products</div>
    <div class="tab" data-tab="inquiries" onclick="switchTab('inquiries')">Inquiries <span id="inqBadge" style="color:var(--champagne);margin-left:6px;"></span></div>
  </nav>

  <!-- PRODUCTS PANE -->
  <div class="pane active" id="pane-products">
    <div class="wrap">

      <!-- Add product form -->
      <div class="add-form">
        <h3>+ Add New Product</h3>
        <div class="msg-bar" id="addMsg"></div>
        <div class="form-row">
          <div class="field"><label>Product Name *</label><input type="text" id="p-name" placeholder="e.g. Samsung Galaxy S24"></div>
          <div class="field"><label>Category *</label>
            <select id="p-cat">
              <option value="">Select category</option>
              <option value="Smartphone">Smartphone</option>
              <option value="Wearable">Wearable</option>
              <option value="Audio">Audio</option>
              <option value="Accessory">Accessory</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="field"><label>Price (₹) *</label><input type="number" id="p-price" placeholder="e.g. 54999"></div>
          <div class="field"><label>Brand</label><input type="text" id="p-brand" placeholder="e.g. Samsung, Apple, OnePlus"></div>
        </div>
        <div class="field"><label>Description</label><textarea id="p-desc" placeholder="Short product description..."></textarea></div>
        <div class="field">
          <label>In Stock</label>
          <select id="p-stock"><option value="true">Yes – In Stock</option><option value="false">No – Out of Stock</option></select>
        </div>
        <div class="form-actions">
          <button class="btn btn-gold" onclick="addProduct()">Add Product</button>
          <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
        </div>
      </div>

      <!-- Product list -->
      <div class="pane-header">
        <h2>All Products</h2>
        <button class="btn btn-ghost" onclick="loadProducts()">↻ Refresh</button>
      </div>
      <div id="prodList"><div class="loading-dots"><span></span><span></span><span></span></div></div>

    </div>
  </div>

  <!-- INQUIRIES PANE -->
  <div class="pane" id="pane-inquiries">
    <div class="wrap">
      <div class="pane-header">
        <h2>Customer Inquiries</h2>
        <button class="btn btn-ghost" onclick="loadInquiries()">↻ Refresh</button>
      </div>
      <div id="inqList"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>
</div>

<script>
let adminPassword = '';

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function login() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  // Validate by hitting admin endpoint
  const res = await fetch('/.netlify/functions/admin', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'inquiries', password: pw })
  });
  if (res.ok) {
    adminPassword = pw;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProducts();
    loadInquiries();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  adminPassword = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name));
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
async function loadProducts() {
  const el = document.getElementById('prodList');
  el.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  const res = await fetch('/.netlify/functions/products');
  const products = await res.json();
  if (!products.length) { el.innerHTML = '<p class="empty">No products yet. Add one above!</p>'; return; }
  el.innerHTML = `
    <table class="prod-table">
      <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Brand</th><th>Stock</th><th></th></tr></thead>
      <tbody>${products.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td>₹${Number(p.price).toLocaleString('en-IN')}</td>
          <td>${p.brand || '—'}</td>
          <td><span class="badge ${p.inStock ? 'badge-in' : 'badge-out'}">${p.inStock ? 'In Stock' : 'Out of Stock'}</span></td>
          <td><button class="btn btn-danger" onclick="deleteProduct('${p._id}')">Delete</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function addProduct() {
  const msg = document.getElementById('addMsg');
  msg.className = 'msg-bar';
  const product = {
    name: document.getElementById('p-name').value.trim(),
    category: document.getElementById('p-cat').value,
    price: document.getElementById('p-price').value,
    brand: document.getElementById('p-brand').value.trim(),
    description: document.getElementById('p-desc').value.trim(),
    inStock: document.getElementById('p-stock').value === 'true',
  };
  if (!product.name || !product.category || !product.price) {
    msg.textContent = '✗ Name, category and price are required.';
    msg.className = 'msg-bar error'; return;
  }
  const res = await fetch('/.netlify/functions/admin', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'add', product, password: adminPassword })
  });
  if (res.ok) {
    msg.textContent = '✓ Product added successfully!';
    msg.className = 'msg-bar success';
    clearForm(); loadProducts();
  } else {
    msg.textContent = '✗ Failed to add product.';
    msg.className = 'msg-bar error';
  }
}

async function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  await fetch('/.netlify/functions/admin', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete', id, password: adminPassword })
  });
  loadProducts();
}

function clearForm() {
  ['p-name','p-price','p-brand','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-cat').value = '';
  document.getElementById('p-stock').value = 'true';
}

// ─── INQUIRIES ────────────────────────────────────────────────────────────────
async function loadInquiries() {
  const el = document.getElementById('inqList');
  el.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  const res = await fetch('/.netlify/functions/admin', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'inquiries', password: adminPassword })
  });
  const inquiries = await res.json();
  const newCount = inquiries.filter(i => i.status === 'new').length;
  document.getElementById('inqBadge').textContent = newCount > 0 ? `(${newCount} new)` : '';

  if (!inquiries.length) { el.innerHTML = '<p class="empty">No inquiries yet.</p>'; return; }
  el.innerHTML = inquiries.map(i => `
    <div class="inq-card ${i.status === 'resolved' ? 'resolved' : ''}">
      <div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px;">
          <strong style="font-size:16px;">${i.name}</strong>
          <span class="status-${i.status}" style="font-size:11px;letter-spacing:1px;text-transform:uppercase;">${i.status}</span>
        </div>
        <div class="inq-meta">
          <span class="inq-tag">📞 ${i.phone}</span>
          ${i.email ? `<span class="inq-tag">✉ ${i.email}</span>` : ''}
          ${i.product ? `<span class="inq-tag">🛍 ${i.product}</span>` : ''}
        </div>
        ${i.message ? `<p style="font-size:13px;color:var(--bone-dim);margin-top:12px;line-height:1.6;">${i.message}</p>` : ''}
        <p class="inq-date" style="margin-top:10px;">${new Date(i.createdAt).toLocaleString('en-IN')}</p>
      </div>
      ${i.status === 'new' ? `<button class="btn btn-ghost" style="white-space:nowrap;font-size:10px;padding:9px 16px;" onclick="resolve('${i._id}')">Mark Resolved</button>` : ''}
    </div>
  `).join('');
}

async function resolve(id) {
  await fetch('/.netlify/functions/admin', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'resolve', id, password: adminPassword })
  });
  loadInquiries();
}

// Enter key on password
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') login();
});
</script>
</body>
</html>
